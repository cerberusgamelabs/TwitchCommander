<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>Twitch Commander</title>
        <link rel="stylesheet" href="main.css">
  </head>
  <body>
    <div class="app-shell">
      <header class="app-header">
        <div class="app-nav">
          <button id="nav-main-button" class="nav-button active" style="border-radius: 0px;" type="button">Home</button>
          <div class="menu-wrap">
            <button id="games-menu-button" class="nav-button" style="border-radius: 0px;" type="button">Games</button>
            <div id="games-menu-panel" class="menu-panel" hidden></div>
          </div>
          <button id="nav-settings-button" class="nav-button" style="border-radius: 0px;" type="button">Settings</button>
          <button id="exit-button" class="nav-button" style="border-radius: 0px;" type="button">Exit</button>
          <div class="header-actions">
            <div id="header-window-chip" class="status-chip stopped">Target Not Active</div>
		    <div id="header-status-chip" class="status-chip stopped">Bot stopped</div>
		    <button id="start-button" class="success">Start</button>
            <button id="stop-button" class="danger">Stop</button>
            <button id="save-button" class="primary">Save</button>
          </div>
        </div>
      </header>

      <div class="app-content">
      <section id="page-main" class="page active">
        <div class="panel">
          <div class="hero-card-header">
            <div>
              <h1 class="title">TwitchCommander</h1>
            </div>
          </div>
          <div class="toolbar">
            <button id="home-start-button" class="success">Start Bot</button>
            <button id="home-stop-button" class="danger">Stop Bot</button>
            <button id="home-save-button" class="primary">Save Changes</button>
            <button id="update-command-list-button">Update Command List</button>
            <button id="reload-button">Reload Files</button>
          </div>
          <div id="message-banner" class="banner tiny">Loading configuration...</div>
          <div class="tab-row">
            <button id="bot-logs-tab" class="tab-button active" type="button">Bot Logs</button>
            <button id="error-logs-tab" class="tab-button" type="button">Error Logs</button>
          </div>
          <div id="logs" class="logs" style="margin-top: 12px;"></div>
          <div id="errors" class="logs error" style="margin-top: 12px;" hidden></div>
        </div>
      </section>

      <section id="page-settings" class="page">
        <div class="panel">
          <h2 class="section-title">Settings</h2>
          <div class="grid-2">
            <div class="field">
              <label for="username">Bot Username</label>
              <input id="username" type="text">
            </div>
            <div class="field">
              <label for="channel">Channel</label>
              <input id="channel" type="text">
            </div>
            <div class="field">
              <div class="field-header">
                <label>OAuth Token</label>
                <span id="oauth-status-pill" class="pill warn">Not Set</span>
              </div>
              <div class="button-pair">
                <button id="oauth-button" type="button">Get Token</button>
                <button id="copy-oauth-button" type="button">Copy</button>
              </div>
            </div>
            <div class="field">
              <button id="update-command-list-button-settings" type="button">Update Command List</button>
            </div>
            <div class="field">
              <label for="trigger">Command Trigger</label>
              <input id="trigger" type="text">
            </div>
            <div class="field">
              <label for="vote-length">Vote Length (seconds)</label>
              <input id="vote-length" type="number" min="1">
            </div>
            <div class="field">
              <label for="active-game">Active Game</label>
              <select id="active-game"></select>
            </div>
            <div class="field">
              <label for="bit-rewards">Bit Rewards</label>
              <select id="bit-rewards">
                <option value="true">Enabled</option>
                <option value="false">Disabled</option>
              </select>
            </div>
            <div class="field">
              <label for="recent-command-count">Recent Command Feed Size</label>
              <input id="recent-command-count" type="number" min="1" max="50">
              <div class="button-pair">
                <button id="test-recent-command-button" type="button">Test Recent Command</button>
                <button id="clear-recent-commands-button" class="danger" type="button">Clear Recent Commands</button>
              </div>
            </div>
          </div>
        </div>
      </section>

      <section id="page-add-game" class="page">
        <div class="panel">
          <h2 class="section-title">Add Game</h2>
          <div class="grid-2">
            <div class="field">
              <label for="add-game-key">Game Key</label>
              <input id="add-game-key" type="text" placeholder="examplegame">
            </div>
            <div class="field">
              <label for="add-game-process">Target Process Name</label>
              <input id="add-game-process" type="text" placeholder="GameProcess">
              <div class="triple-actions">
                <select id="add-game-process-select">
                  <option value="">Select running app...</option>
                </select>
                <button id="use-add-game-process-button" type="button">Use</button>
                <button id="refresh-add-game-processes-button" type="button">Refresh</button>
              </div>
            </div>
            <div class="field">
              <label for="add-game-title">Target Window Title</label>
              <input id="add-game-title" type="text" placeholder="Game Window Title">
            </div>
            <div class="field">
              <label for="add-game-display">Bounded Input Display</label>
              <select id="add-game-display">
                <option value="">Use target window bounds</option>
              </select>
            </div>
          </div>
          <button id="create-game-button" class="primary" type="button">Create Game</button>
        </div>
      </section>

      <section id="page-game" class="page">
        <div class="game-editor-grid">
          <aside class="panel">
            <h2 id="game-page-heading" class="section-title">Commands</h2>
            <div class="field">
              <label for="new-command-key">New Command Key</label>
              <input id="new-command-key" type="text" placeholder="panleft">
            </div>
            <button id="add-command-button" type="button">Add Command</button>
            <div id="command-nav-list" class="command-nav-list"></div>
          </aside>

          <div class="list" style="gap: 18px;">
            <div class="panel">
              <div class="title-row">
                <h2 class="section-title" style="margin-bottom: 0;">Game Settings</h2>
                <div class="inline-actions">
                  <button id="duplicate-game-button">Duplicate Game</button>
                  <button id="delete-game-button" class="danger">Delete Game</button>
                </div>
              </div>
              <div class="grid-2" style="margin-top: 14px;">
                <div class="field">
                  <label for="selected-game-key">Game Key</label>
                  <input id="selected-game-key" type="text">
                </div>
                <div class="field">
                  <label for="game-process">Target Process Name</label>
                  <input id="game-process" type="text">
                  <div class="triple-actions">
                    <select id="game-process-select">
                      <option value="">Select running app...</option>
                    </select>
                    <button id="use-game-process-button" type="button">Use</button>
                    <button id="refresh-game-processes-button" type="button">Refresh</button>
                  </div>
                </div>
                <div class="field">
                  <label for="game-title">Target Window Title</label>
                  <input id="game-title" type="text">
                </div>
                <div class="field">
                  <label for="game-display">Bounded Input Display</label>
                  <select id="game-display">
                    <option value="">Use target window bounds</option>
                  </select>
                </div>
              </div>
            </div>

            <div class="panel">
              <div>
                <h2 id="game-editor-title" class="section-title" style="margin-bottom: 4px;">Command Editor</h2>
                <div id="game-editor-subtitle" class="meta tiny"></div>
              </div>
              <div id="commands-container" class="list" style="margin-top: 14px;"></div>
            </div>
          </div>
        </div>
      </section>
      </div>

    </div>

        <script src="app.js"></script>
  </body>
</html>
